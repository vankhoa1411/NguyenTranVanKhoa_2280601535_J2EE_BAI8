<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Access Denied</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height:100vh;
    background: linear-gradient(135deg,#f77062,#fe5196);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, Helvetica, sans-serif;
}

.access-card {
    width:400px;
    padding:40px;
    border-radius:15px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.access-card h1 {
    font-size:60px;
    margin-bottom:20px;
    color:#ff4b5c;
}

.access-card h3 {
    margin-bottom:20px;
    font-weight:bold;
}

.access-card p {
    margin-bottom:30px;
    color:#555;
}

.btn-back {
    padding:10px 20px;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="access-card">
    <h1>🚫</h1>
    <h3>Access Denied</h3>
    <p>Bạn không có quyền truy cập chức năng này.</p>
    <a th:href="@{/products}" class="btn btn-primary btn-back">Quay về trang chính</a>
</div>

</body>
</html>
