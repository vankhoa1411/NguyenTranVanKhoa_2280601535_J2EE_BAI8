<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
        footer {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/products"><strong>📦 Quản lý sản phẩm</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/products">Danh sách sản phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products/add">Thêm sản phẩm</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <h2 class="mb-4">✏️ Chỉnh sửa sản phẩm</h2>

                <form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Giá <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{price}" class="form-control" min="1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hình ảnh (nếu muốn thay)</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                        <div th:if="${product.image != null and product.image != ''}" class="mt-2">
                            <small class="text-muted">Ảnh hiện tại:</small><br>
                            <img th:src="@{/assets/{img}(img=${product.image})}" width="150" class="img-thumbnail mt-2">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Danh mục <span class="text-danger">*</span></label>
                        <select name="categoryId" class="form-select" required>
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${product.category != null and product.category.id == c.id}"></option>
                        </select>
                    </div>

                    <div>
                        <button type="submit" class="btn btn-primary">💾 Cập nhật</button>
                        <a href="/products" class="btn btn-secondary">↩️ Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 text-muted">
        <p class="mb-0">© 2280603561 - Nguyễn Đức Tuấn</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
