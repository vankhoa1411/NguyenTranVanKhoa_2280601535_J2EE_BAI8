<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/products"><i class="bi bi-shop"></i> Shop</a>
        <a href="/cart" class="btn btn-outline-light position-relative">
            <i class="bi bi-cart3"></i> Giỏ hàng
            <span th:if="${cartCount > 0}"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  th:text="${cartCount}"></span>
        </a>
    </div>
</nav>

<div class="container" style="max-width:900px;">
    <h3 class="mb-4"><i class="bi bi-cart3"></i> Giỏ Hàng Của Bạn</h3>

    <!-- Giỏ rỗng -->
    <div th:if="${cartItems.isEmpty()}" class="text-center py-5">
        <i class="bi bi-cart-x display-1 text-muted"></i>
        <p class="mt-3 fs-5 text-muted">Giỏ hàng đang trống.</p>
        <a href="/products" class="btn btn-primary mt-2">
            <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
        </a>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════
         Câu 6 – Bảng giỏ hàng: tên / giá / số lượng / thành tiền
         ═══════════════════════════════════════════════════════════ -->
    <div th:unless="${cartItems.isEmpty()}">
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-primary">
                    <tr>
                        <th>Ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th class="text-end">Đơn giá (VNĐ)</th>
                        <th class="text-center">Số lượng</th>
                        <th class="text-end">Thành tiền (VNĐ)</th>
                        <th class="text-center">Xóa</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cartItems}">
                        <!-- Ảnh -->
                        <td>
                            <img th:if="${item.image != null and !item.image.isEmpty()}"
                                 th:src="@{'/assets/' + ${item.image}}"
                                 width="55" height="55"
                                 style="object-fit:cover;border-radius:6px;">
                            <i th:if="${item.image == null or item.image.isEmpty()}"
                               class="bi bi-image text-muted fs-4"></i>
                        </td>

                        <!-- Tên sản phẩm -->
                        <td class="fw-semibold" th:text="${item.productName}"></td>

                        <!-- Đơn giá -->
                        <td class="text-end"
                            th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')}"></td>

                        <!-- Số lượng (có thể chỉnh sửa) -->
                        <td class="text-center">
                            <form th:action="@{/cart/update}" method="post"
                                  class="d-flex justify-content-center gap-1">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <input type="number" name="quantity" th:value="${item.quantity}"
                                       min="1" max="99"
                                       class="form-control form-control-sm text-center"
                                       style="width:70px;">
                                <button type="submit" class="btn btn-outline-secondary btn-sm"
                                        title="Cập nhật">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </form>
                        </td>

                        <!-- Thành tiền -->
                        <td class="text-end fw-bold text-success"
                            th:text="${#numbers.formatInteger(item.subtotal, 0, 'COMMA')}"></td>

                        <!-- Nút xóa -->
                        <td class="text-center">
                            <form th:action="@{/cart/remove}" method="post">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Xóa sản phẩm này?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>

                    <!-- Tổng tiền -->
                    <tfoot>
                    <tr class="table-warning">
                        <td colspan="4" class="text-end fw-bold fs-5">Tổng cộng:</td>
                        <td class="text-end fw-bold fs-5 text-danger"
                            th:text="${#numbers.formatInteger(totalAmount, 0, 'COMMA')} + ' VNĐ'"></td>
                        <td></td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- Nút hành động -->
        <div class="d-flex justify-content-between mt-4">
            <a href="/products" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>
            <a href="/cart/checkout" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-bag-check"></i> Đặt hàng ngay
            </a>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
