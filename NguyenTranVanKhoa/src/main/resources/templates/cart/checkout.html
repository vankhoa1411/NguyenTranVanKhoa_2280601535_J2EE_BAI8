<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Hàng</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/products"><i class="bi bi-shop"></i> Shop</a>
    </div>
</nav>

<div class="container" style="max-width:700px;">
    <h3 class="mb-4"><i class="bi bi-bag-check"></i> Xác Nhận Đặt Hàng</h3>

    <!-- ═══════════════════════════════════════════════════════════════
         Câu 7 – Tóm tắt đơn hàng trước khi xác nhận
         ═══════════════════════════════════════════════════════════ -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header fw-bold bg-primary text-white">
            <i class="bi bi-list-ul"></i> Tóm tắt đơn hàng
        </div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-light">
                <tr>
                    <th>Tên sản phẩm</th>
                    <th class="text-end">Đơn giá (VNĐ)</th>
                    <th class="text-center">Số lượng</th>
                    <th class="text-end">Thành tiền (VNĐ)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.productName}" class="fw-semibold"></td>
                    <td class="text-end"
                        th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')}"></td>
                    <td class="text-center" th:text="${item.quantity}"></td>
                    <td class="text-end fw-bold"
                        th:text="${#numbers.formatInteger(item.subtotal, 0, 'COMMA')}"></td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="table-warning">
                    <td colspan="3" class="text-end fw-bold fs-5">Tổng cộng:</td>
                    <td class="text-end fw-bold fs-5 text-danger"
                        th:text="${#numbers.formatInteger(totalAmount, 0, 'COMMA')} + ' VNĐ'"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Form nhập thông tin khách hàng và xác nhận -->
    <div class="card shadow-sm">
        <div class="card-header fw-bold">
            <i class="bi bi-person-fill"></i> Thông tin người đặt
        </div>
        <div class="card-body">
            <form th:action="@{/cart/checkout}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Họ và tên người nhận <span class="text-danger">*</span>
                    </label>
                    <input type="text" name="customerName" class="form-control"
                           placeholder="Nhập họ tên..." required
                           maxlength="100">
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/cart" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Quay lại giỏ hàng
                    </a>
                    <button type="submit" class="btn btn-success btn-lg px-5">
                        <i class="bi bi-check-circle"></i> Xác nhận đặt hàng
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
