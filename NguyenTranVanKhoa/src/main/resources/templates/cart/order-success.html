<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Hàng Thành Công</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/products"><i class="bi bi-shop"></i> Shop</a>
    </div>
</nav>

<div class="container" style="max-width:600px; margin-top:60px;">
    <div class="card shadow text-center">
        <div class="card-body py-5 px-4">

            <!-- Icon thành công -->
            <i class="bi bi-check-circle-fill text-success" style="font-size:4rem;"></i>
            <h2 class="mt-3 text-success fw-bold">Đặt hàng thành công!</h2>
            <p class="text-muted">Cảm ơn bạn đã mua hàng. Đơn hàng đã được ghi nhận.</p>

            <hr class="my-3">

            <!-- Thông tin đơn hàng -->
            <div class="text-start mb-3">
                <table class="table table-borderless mb-0">
                    <tr>
                        <td class="fw-semibold text-muted" style="width:45%">Mã đơn hàng:</td>
                        <td class="fw-bold">#<span th:text="${order.id}"></span></td>
                    </tr>
                    <tr>
                        <td class="fw-semibold text-muted">Khách hàng:</td>
                        <td th:text="${order.customerName}"></td>
                    </tr>
                    <tr>
                        <td class="fw-semibold text-muted">Ngày đặt:</td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                    </tr>
                    <tr>
                        <td class="fw-semibold text-muted">Số loại sản phẩm:</td>
                        <td th:text="${order.orderDetails.size()} + ' sản phẩm'"></td>
                    </tr>
                </table>
            </div>

            <!-- Tổng tiền -->
            <div class="alert alert-success fs-5 fw-bold mb-4">
                Tổng thanh toán:&nbsp;
                <span class="text-danger"
                      th:text="${#numbers.formatInteger(order.totalAmount, 0, 'COMMA')} + ' VNĐ'">
                </span>
            </div>

            <a href="/products" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
